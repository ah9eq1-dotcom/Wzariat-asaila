<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>بنك الأسئلة الوزارية</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Tahoma,sans-serif;
}

body{
background:#f4f7fb;
}

header{
background:#2563eb;
color:white;
padding:25px;
text-align:center;
box-shadow:0 2px 10px rgba(0,0,0,.15);
}

.container{
max-width:1200px;
margin:auto;
padding:20px;
}

.search{
width:100%;
padding:15px;
border:none;
border-radius:12px;
margin-bottom:25px;
font-size:16px;
box-shadow:0 2px 10px rgba(0,0,0,.1);
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(250px,1fr));
gap:20px;
}

.card{
background:white;
padding:20px;
border-radius:18px;
box-shadow:0 4px 15px rgba(0,0,0,.08);
transition:.3s;
text-align:center;
}

.card:hover{
transform:translateY(-5px);
}

.card h3{
margin-bottom:15px;
color:#1e293b;
}

.btn{
display:inline-block;
padding:10px 18px;
background:#2563eb;
color:white;
text-decoration:none;
border-radius:10px;
}

footer{
margin-top:40px;
text-align:center;
padding:20px;
color:#666;
}
</style>
</head>

<body>

<header>
<h1>📚 بنك الأسئلة الوزارية</h1>
<p>السادس العلمي والأدبي</p>
</header>

<div class="container">

<input
type="text"
class="search"
id="search"
placeholder="ابحث عن المادة..."
>

<div class="grid" id="subjects">

<div class="card">
<h3>الرياضيات</h3>
<a class="btn" href="pdf/math.pdf">تحميل PDF</a>
</div>

<div class="card">
<h3>الفيزياء</h3>
<a class="btn" href="pdf/physics.pdf">تحميل PDF</a>
</div>

<div class="card">
<h3>الكيمياء</h3>
<a class="btn" href="pdf/chemistry.pdf">تحميل PDF</a>
</div>

<div class="card">
<h3>الأحياء</h3>
<a class="btn" href="pdf/biology.pdf">تحميل PDF</a>
</div>

<div class="card">
<h3>العربي</h3>
<a class="btn" href="pdf/arabic.pdf">تحميل PDF</a>
</div>

<div class="card">
<h3>الإنكليزي</h3>
<a class="btn" href="pdf/english.pdf">تحميل PDF</a>
</div>

<div class="card">
<h3>الاقتصاد</h3>
<a class="btn" href="pdf/economy.pdf">تحميل PDF</a>
</div>

<div class="card">
<h3>الجغرافية</h3>
<a class="btn" href="pdf/geography.pdf">تحميل PDF</a>
</div>

<div class="card">
<h3>التاريخ</h3>
<a class="btn" href="pdf/history.pdf">تحميل PDF</a>
</div>

</div>

</div>

<footer>
جميع الحقوق محفوظة © بنك الأسئلة الوزارية
</footer>

<script>
const search = document.getElementById("search");

search.addEventListener("keyup", function(){

const filter = search.value.toLowerCase();

document.querySelectorAll(".card").forEach(card=>{

const text = card.innerText.toLowerCase();

card.style.display =
text.includes(filter)
? "block"
: "none";

});

});
</script>

</body>
</html>
